# electron-builder config — used by the CI release workflow to build signed,
# multi-platform installers. (For a quick local Windows build with no admin
# rights, use `pnpm dist`, which assembles a portable zip via scripts/pack.mjs.)
appId: com.greatwhitej.merscribe
productName: MerScribe
# asar disabled so the bundled http server can read the static out/ files directly.
asar: false
# The app's runtime is just electron/main.cjs serving the static export — no
# node_modules are needed (the out/ bundle is self-contained).
files:
  - electron/**/*
  - package.json
  - '!node_modules/**'
# out/ is .gitignored, which electron-builder's file globbing skips; copy it as
# an extra resource instead so it reliably lands at <resources>/out.
extraResources:
  - from: out
    to: out
directories:
  output: dist
publish:
  provider: github
  owner: GreatWhiteJ
  repo: merscribe

win:
  icon: electron/icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  artifactName: MerScribe-${version}-setup.${ext}

mac:
  category: public.app-category.productivity
  icon: electron/icon.png
  target:
    - target: dmg
      arch: [arm64, x64]
  artifactName: MerScribe-${version}-${arch}.${ext}

linux:
  category: Graphics
  icon: electron/icon.png
  target:
    - AppImage
  artifactName: MerScribe-${version}-${arch}.${ext}
