name: Release

# Push a version tag (e.g. v0.1.1) to build and publish installers for all
# platforms to the matching GitHub Release.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create/upload release assets via GITHUB_TOKEN

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build static app
        run: pnpm build

      # Export signing vars ONLY when the secrets exist. Passing an empty
      # CSC_LINK makes electron-builder treat "" as a cert file path and fail
      # (notably on macOS); omitting it entirely yields a clean unsigned build.
      - name: Configure code signing (if secrets present)
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          S_WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          S_WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          S_APPLE_ID: ${{ secrets.APPLE_ID }}
          S_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          S_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            { echo "CSC_LINK=$MAC_CSC_LINK"; echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD"; } >> "$GITHUB_ENV"
          fi
          if [ -n "$S_WIN_CSC_LINK" ]; then
            { echo "WIN_CSC_LINK=$S_WIN_CSC_LINK"; echo "WIN_CSC_KEY_PASSWORD=$S_WIN_CSC_KEY_PASSWORD"; } >> "$GITHUB_ENV"
          fi
          if [ -n "$S_APPLE_ID" ]; then
            { echo "APPLE_ID=$S_APPLE_ID"; echo "APPLE_APP_SPECIFIC_PASSWORD=$S_APPLE_APP_SPECIFIC_PASSWORD"; echo "APPLE_TEAM_ID=$S_APPLE_TEAM_ID"; } >> "$GITHUB_ENV"
          fi

      - name: Package & publish (electron-builder)
        run: pnpm exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Don't auto-search the keychain for a signing identity; signing only
          # happens when CSC_LINK was exported above (i.e. a cert secret was set).
          CSC_IDENTITY_AUTO_DISCOVERY: false
